name: PR Checks

on:
    pull_request:
        branches: [main, dev]

jobs:
    checks:
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: shop_demo
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        env:
            DATABASE_URL: postgresql://postgres:postgres@localhost:5432/shop_demo

        strategy:
            matrix:
                node-version: [20.x]

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Generate Prisma client
              run: npx prisma generate

            - name: Apply database migrations
              run: npm run db:migrate

            - name: Seed database
              run: npm run db:seed

            - name: Type check
              run: |
                  rm -rf .next
                  npx next typegen
                  npx tsc --noEmit

            - name: Lint
              run: npm run lint

            - name: Format check
              run: npm run format:check

            - name: Build
              run: npm run build
