name: PR Checks

on:
    pull_request:
        branches: [main, dev]

jobs:
    checks:
        runs-on: ubuntu-latest

        env:
            DATABASE_URL: postgresql://postgres:postgres@localhost:5432/shop_demo

        strategy:
            matrix:
                node-version: [20.x]

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Generate Prisma client
              run: npx prisma generate

            - name: Type check
              run: |
                  rm -rf .next
                  npx next typegen
                  npx tsc --noEmit

            - name: Lint
              run: npm run lint

            - name: Format check
              run: npm run format:check

            - name: Build
              run: npm run build
